name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix: 4 targets in parallel ────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

          - target: aarch64-apple-darwin
            os: macos-latest

          - target: x86_64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true

      - name: Package binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="waro-cli-${VERSION}-${TARGET}.tar.gz"

          # Binary lives at target/<target>/release/waro
          mkdir -p dist
          cp "target/${TARGET}/release/waro" dist/waro

          # Create archive with binary at root
          tar -czf "${ARCHIVE}" -C dist waro

          # Generate SHA256 checksum
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waro-cli-${{ matrix.target }}
          path: |
            waro-cli-*.tar.gz
            waro-cli-*.tar.gz.sha256
          if-no-files-found: error

  # ── Publish: collect all artifacts and create GitHub Release ───────────
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256
          echo "── checksums.sha256 ──"
          cat checksums.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.sha256
          body: |
            ## Install

            Download the binary for your platform:

            | Platform | File |
            |---|---|
            | Linux x86_64 | `waro-cli-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux ARM64 | `waro-cli-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS Apple Silicon | `waro-cli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | macOS Intel | `waro-cli-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |

            ```bash
            # Extract and install
            tar xzf waro-cli-${{ github.ref_name }}-<platform>.tar.gz
            sudo mv waro /usr/local/bin/

            # Verify checksum
            sha256sum -c checksums.sha256
            ```

            ## Setup
            ```bash
            export WARO_API_KEY=waro_sk_your_key_here
            waro --help
            ```
